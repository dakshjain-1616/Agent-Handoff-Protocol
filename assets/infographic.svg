<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" width="980" height="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="packetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="adapterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="600" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <g filter="url(#softShadow)">
    <rect x="20" y="20" width="940" height="64" rx="14" fill="url(#titleGrad)"/>
  </g>
  <text x="44" y="54" fill="#fef3c7" font-size="22" font-weight="700">🤝 Agent Handoff Protocol</text>
  <text x="44" y="74" fill="#cbd5e1" font-size="13" font-weight="400">Portable context packets across frameworks</text>
  <text x="940" y="58" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="end">v1.0 · Pydantic · SQLite</text>
  <text x="940" y="74" fill="#94a3b8" font-size="10" text-anchor="end">LangGraph · CrewAI · ADK · smolagents</text>

  <!-- Section label: Pipeline -->
  <text x="44" y="118" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5">AGENT PIPELINE</text>
  <line x1="180" y1="114" x2="700" y2="114" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Agent pipeline row -->
  <g font-size="12" font-weight="600">
    <!-- Research Agent -->
    <g filter="url(#softShadow)">
      <rect x="40" y="130" width="110" height="62" rx="12" fill="url(#agentGrad)" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    <text x="95" y="155" text-anchor="middle" fill="#334155" font-size="16">🔎</text>
    <text x="95" y="175" text-anchor="middle" fill="#334155">Research</text>
    <text x="95" y="187" text-anchor="middle" fill="#64748b" font-size="10" font-weight="400">Agent</text>

    <!-- Packet 1 -->
    <g filter="url(#softShadow)">
      <rect x="170" y="142" width="70" height="38" rx="9" fill="url(#packetGrad)"/>
    </g>
    <text x="205" y="166" text-anchor="middle" fill="#78350f" font-size="13">📦</text>

    <!-- Writer -->
    <g filter="url(#softShadow)">
      <rect x="260" y="130" width="110" height="62" rx="12" fill="url(#agentGrad)" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    <text x="315" y="155" text-anchor="middle" fill="#334155" font-size="16">✍️</text>
    <text x="315" y="175" text-anchor="middle" fill="#334155">Writer</text>
    <text x="315" y="187" text-anchor="middle" fill="#64748b" font-size="10" font-weight="400">Agent</text>

    <!-- Packet 2 -->
    <g filter="url(#softShadow)">
      <rect x="390" y="142" width="70" height="38" rx="9" fill="url(#packetGrad)"/>
    </g>
    <text x="425" y="166" text-anchor="middle" fill="#78350f" font-size="13">📦</text>

    <!-- Editor -->
    <g filter="url(#softShadow)">
      <rect x="480" y="130" width="110" height="62" rx="12" fill="url(#agentGrad)" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    <text x="535" y="155" text-anchor="middle" fill="#334155" font-size="16">📝</text>
    <text x="535" y="175" text-anchor="middle" fill="#334155">Editor</text>
    <text x="535" y="187" text-anchor="middle" fill="#64748b" font-size="10" font-weight="400">Agent</text>

    <!-- Packet 3 -->
    <g filter="url(#softShadow)">
      <rect x="610" y="142" width="70" height="38" rx="9" fill="url(#packetGrad)"/>
    </g>
    <text x="645" y="166" text-anchor="middle" fill="#78350f" font-size="13">📦</text>

    <!-- Publisher -->
    <g filter="url(#softShadow)">
      <rect x="700" y="130" width="110" height="62" rx="12" fill="url(#agentGrad)" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    <text x="755" y="155" text-anchor="middle" fill="#334155" font-size="16">🚀</text>
    <text x="755" y="175" text-anchor="middle" fill="#334155">Publisher</text>
    <text x="755" y="187" text-anchor="middle" fill="#64748b" font-size="10" font-weight="400">Agent</text>
  </g>

  <!-- Flow arrows between pipeline -->
  <g stroke="#f59e0b" stroke-width="2" fill="none">
    <line x1="150" y1="161" x2="168" y2="161" marker-end="url(#arrowAmber)"/>
    <line x1="240" y1="161" x2="258" y2="161" marker-end="url(#arrowAmber)"/>
    <line x1="370" y1="161" x2="388" y2="161" marker-end="url(#arrowAmber)"/>
    <line x1="460" y1="161" x2="478" y2="161" marker-end="url(#arrowAmber)"/>
    <line x1="590" y1="161" x2="608" y2="161" marker-end="url(#arrowAmber)"/>
    <line x1="680" y1="161" x2="698" y2="161" marker-end="url(#arrowAmber)"/>
  </g>

  <!-- Sidebar: HandoffPacket fields -->
  <g filter="url(#softShadow)">
    <rect x="830" y="108" width="130" height="352" rx="14" fill="url(#sidebarGrad)" stroke="#fcd34d" stroke-width="1"/>
  </g>
  <text x="895" y="132" text-anchor="middle" fill="#78350f" font-size="12" font-weight="700">📦 HandoffPacket</text>
  <line x1="846" y1="142" x2="944" y2="142" stroke="#fcd34d" stroke-width="1"/>
  <g font-size="10.5" fill="#78350f" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <text x="846" y="162">• task_id</text>
    <text x="846" y="184">• original_goal</text>
    <text x="846" y="206">• completed_steps</text>
    <text x="846" y="228">• remaining_steps</text>
    <text x="846" y="250">• working_memory</text>
    <text x="846" y="272">• tool_results_cache</text>
    <text x="846" y="294">• confidence_score</text>
    <text x="846" y="316">• priority</text>
  </g>
  <g font-size="9" fill="#92400e" font-family="ui-monospace, monospace">
    <rect x="846" y="332" width="40" height="16" rx="4" fill="#dcfce7" stroke="#86efac"/>
    <text x="866" y="343" text-anchor="middle" fill="#166534">LOW</text>
    <rect x="890" y="332" width="40" height="16" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="910" y="343" text-anchor="middle" fill="#92400e">MED</text>
    <rect x="846" y="354" width="40" height="16" rx="4" fill="#ffedd5" stroke="#fdba74"/>
    <text x="866" y="365" text-anchor="middle" fill="#9a3412">HIGH</text>
    <rect x="890" y="354" width="40" height="16" rx="4" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="910" y="365" text-anchor="middle" fill="#991b1b">CRIT</text>
  </g>
  <line x1="846" y1="388" x2="944" y2="388" stroke="#fcd34d" stroke-width="1"/>
  <text x="895" y="406" text-anchor="middle" fill="#78350f" font-size="10" font-weight="600">Validator</text>
  <text x="895" y="422" text-anchor="middle" fill="#92400e" font-size="9">schema checks</text>
  <text x="895" y="440" text-anchor="middle" fill="#78350f" font-size="10" font-weight="600">Serializer</text>
  <text x="895" y="454" text-anchor="middle" fill="#92400e" font-size="9">JSON / bytes</text>

  <!-- Section: Adapters -->
  <text x="44" y="238" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5">FRAMEWORK ADAPTERS</text>
  <line x1="220" y1="234" x2="810" y2="234" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Adapter up-arrows converging to packet row -->
  <g stroke="#14b8a6" stroke-width="2" fill="none" stroke-dasharray="4 3">
    <line x1="110" y1="320" x2="205" y2="195" marker-end="url(#arrowTeal)"/>
    <line x1="300" y1="320" x2="425" y2="195" marker-end="url(#arrowTeal)"/>
    <line x1="500" y1="320" x2="535" y2="195" marker-end="url(#arrowTeal)"/>
    <line x1="700" y1="320" x2="645" y2="195" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- Adapter boxes -->
  <g font-size="12" font-weight="600" fill="#ffffff">
    <g filter="url(#softShadow)">
      <rect x="50" y="320" width="150" height="70" rx="12" fill="url(#adapterGrad)"/>
    </g>
    <text x="125" y="348" text-anchor="middle" font-size="18">🕸️</text>
    <text x="125" y="372" text-anchor="middle">LangGraph</text>

    <g filter="url(#softShadow)">
      <rect x="240" y="320" width="150" height="70" rx="12" fill="url(#adapterGrad)"/>
    </g>
    <text x="315" y="348" text-anchor="middle" font-size="18">👥</text>
    <text x="315" y="372" text-anchor="middle">CrewAI</text>

    <g filter="url(#softShadow)">
      <rect x="430" y="320" width="150" height="70" rx="12" fill="url(#adapterGrad)"/>
    </g>
    <text x="505" y="348" text-anchor="middle" font-size="18">🧭</text>
    <text x="505" y="372" text-anchor="middle">Google ADK</text>

    <g filter="url(#softShadow)">
      <rect x="620" y="320" width="150" height="70" rx="12" fill="url(#adapterGrad)"/>
    </g>
    <text x="695" y="348" text-anchor="middle" font-size="18">🤖</text>
    <text x="695" y="372" text-anchor="middle">smolagents</text>
  </g>

  <!-- Section: Broker -->
  <text x="44" y="432" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5">PERSISTENCE LAYER</text>
  <line x1="220" y1="428" x2="810" y2="428" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Broker connectors -->
  <g stroke="#334155" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.5">
    <line x1="125" y1="390" x2="125" y2="460"/>
    <line x1="315" y1="390" x2="315" y2="460"/>
    <line x1="505" y1="390" x2="505" y2="460"/>
    <line x1="695" y1="390" x2="695" y2="460"/>
  </g>

  <!-- HandoffBroker bar -->
  <g filter="url(#deepShadow)">
    <rect x="50" y="460" width="720" height="80" rx="14" fill="url(#brokerGrad)"/>
  </g>
  <!-- DB icon -->
  <g transform="translate(82, 488)">
    <ellipse cx="18" cy="0" rx="18" ry="6" fill="#fbbf24"/>
    <path d="M0,0 V24 A18,6 0 0 0 36,24 V0" fill="#f59e0b"/>
    <ellipse cx="18" cy="12" rx="18" ry="6" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <ellipse cx="18" cy="24" rx="18" ry="6" fill="none" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="140" y="490" fill="#fef3c7" font-size="18" font-weight="700">HandoffBroker</text>
  <text x="140" y="510" fill="#cbd5e1" font-size="12">SQLite-backed send / receive · durable queue · transactional delivery</text>
  <g font-size="10" fill="#fbbf24" font-family="ui-monospace, monospace">
    <text x="140" y="528">broker.send(packet)</text>
    <text x="310" y="528">→</text>
    <text x="330" y="528">broker.receive(agent_id)</text>
  </g>

  <!-- Footer legend -->
  <g font-size="10">
    <rect x="50" y="562" width="10" height="10" rx="2" fill="url(#packetGrad)"/>
    <text x="66" y="571" fill="#64748b">HandoffPacket</text>
    <rect x="165" y="562" width="10" height="10" rx="2" fill="url(#adapterGrad)"/>
    <text x="181" y="571" fill="#64748b">Framework Adapter</text>
    <rect x="305" y="562" width="10" height="10" rx="2" fill="#334155"/>
    <text x="321" y="571" fill="#64748b">Broker / Storage</text>
    <rect x="425" y="562" width="10" height="10" rx="2" fill="url(#agentGrad)" stroke="#cbd5e1"/>
    <text x="441" y="571" fill="#64748b">Agent</text>
    <text x="770" y="571" fill="#94a3b8" text-anchor="end">Research → Writer → Editor → Publisher demo</text>
  </g>
</svg>
